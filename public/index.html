<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ═══════════════════════════════════════════
         VIEWPORT & MOBILE
    ═══════════════════════════════════════════ -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Verdant CRM" />

    <!-- ═══════════════════════════════════════════
         FAVICON & ICONS
    ═══════════════════════════════════════════ -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ═══════════════════════════════════════════
         PRIMARY SEO
    ═══════════════════════════════════════════ -->
    <title>Verdant CRM – Smart CRM for Growing Businesses</title>
    <meta name="description" content="Verdant CRM is a lightweight, multi-tenant CRM built for small and growing teams. Manage leads, contacts, deals, tasks, and support tickets — all in one clean workspace." />
    <meta name="keywords" content="CRM, customer relationship management, small business CRM, sales pipeline, lead management, contact management, deal tracking, SaaS CRM" />
    <meta name="author" content="Verdant CRM" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://verdantcrm.app/" />

    <!-- ═══════════════════════════════════════════
         OPEN GRAPH (Facebook, LinkedIn, WhatsApp)
    ═══════════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://verdantcrm.app/" />
    <meta property="og:title" content="Verdant CRM – Smart CRM for Growing Businesses" />
    <meta property="og:description" content="Manage your leads, contacts, deals, and customers in one clean workspace. Verdant CRM is built for small teams that want to close more without the complexity." />
    <meta property="og:image" content="https://verdantcrm.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Verdant CRM dashboard showing leads, deals pipeline, and contact management" />
    <meta property="og:site_name" content="Verdant CRM" />
    <meta property="og:locale" content="en_US" />

    <!-- ═══════════════════════════════════════════
         TWITTER CARD
    ═══════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@verdantcrm" />
    <meta name="twitter:creator" content="@verdantcrm" />
    <meta name="twitter:title" content="Verdant CRM – Smart CRM for Growing Businesses" />
    <meta name="twitter:description" content="Manage leads, contacts, deals, and customers in one clean workspace. Built for small teams that want to close more." />
    <meta name="twitter:image" content="https://verdantcrm.app/og-image.png" />
    <meta name="twitter:image:alt" content="Verdant CRM dashboard" />

    <!-- ═══════════════════════════════════════════
         STRUCTURED DATA — JSON-LD
    ═══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Verdant CRM",
      "url": "https://verdantcrm.app",
      "description": "A lightweight, multi-tenant CRM for small and growing businesses. Manage leads, contacts, deals, tasks, activities, and support tickets in one clean workspace.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free to get started"
      },
      "featureList": [
        "Lead management and conversion",
        "Contact and account management",
        "Visual sales pipeline (Kanban)",
        "Task and activity tracking",
        "Quotes and product catalog",
        "Marketing campaign tracking",
        "Support ticket management",
        "Team collaboration with notes",
        "Multi-tenant workspaces",
        "Role-based access control"
      ],
      "screenshot": "https://verdantcrm.app/og-image.png",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1"
      }
    }
    </script>

    <!-- ═══════════════════════════════════════════
         FONTS — loaded non-blocking so page renders immediately
         even if Google Fonts is slow or unavailable
    ═══════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- media="print" + onload trick: loads fonts without blocking render -->
    <link rel="stylesheet"
          media="print"
          onload="this.media='all'"
          href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" />
    <noscript>
      <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" />
    </noscript>
  </head>
  <body>
    <noscript>
      <div style="font-family:sans-serif;text-align:center;padding:60px 24px;">
        <h1 style="color:#16a34a;margin-bottom:8px;">Verdant CRM</h1>
        <p>You need to enable JavaScript to run Verdant CRM.</p>
      </div>
    </noscript>
    <div id="root"></div>
  </body>
</html>
